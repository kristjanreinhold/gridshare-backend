# Production profile (SPRING_PROFILES_ACTIVE=prod). All values come from env.
# Everything else (OAuth, Twilio, SendGrid, CORS, JWT ttl) is in application.properties
# and already env-driven.

# Postgres — e.g. jdbc:postgresql://<host>/<db>?sslmode=require (Neon needs SSL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

# JWT signing secret (HS256, >= 32 bytes) — must be set in prod.
app.jwt.secret=${JWT_SECRET}

logging.level.org.springframework.security=INFO
