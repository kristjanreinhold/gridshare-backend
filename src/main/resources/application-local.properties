# Local Postgres — see local/compose.yaml (host port 1111)
spring.datasource.url=jdbc:postgresql://localhost:1111/gridshare
spring.datasource.username=gridshare
spring.datasource.password=gridshare

# JWT signing secret (HS256 — must be >= 32 bytes). Override in prod via env.
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-at-least-32-bytes-long}
app.jwt.ttl-seconds=604800
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# --- Google OAuth ---------------------------------------------------------
# Fill these (or set env GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET) to enable
# real Google login. Until set, the app starts fine but /oauth2/** is disabled.
# Authorized redirect URI to register in Google Console:
#   http://localhost:8080/login/oauth2/code/google
#
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=openid,email,profile
