spring.application.name=gridshare
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
# Honor the platform's injected PORT in prod (Fly/Render); default 8111 locally.
server.port=${PORT:8111}

# Comma-separated CORS origins (prod sets the real frontend domain via env).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Unique session cookie name — localhost cookies are shared across ports, so a
# generic JSESSIONID collides with other local apps and breaks the OAuth2
# authorization-request session (causes /login?error). Keep this distinct.
server.servlet.session.cookie.name=GRIDSHARE_SESSION

# Behind a TLS-terminating proxy (Cloud Run) — honor X-Forwarded-* so OAuth
# redirect URIs are built as https, not http.
server.forward-headers-strategy=framework

# Flyway owns the schema; Hibernate must not touch DDL.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# ── App ───────────────────────────────────────────────────────────────────
app.jwt.ttl-seconds=604800
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.jobs.booking-expiry-cron=0 */5 * * * *

# ── Google OAuth ──────────────────────────────────────────────────────────
# Client ID is not secret (exposed in the browser flow). Secret MUST come from
# the GOOGLE_CLIENT_SECRET env var — never commit it.
# Redirect URI to register in Google Console: {host}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:87311077412-fd9d7u384ie839ad083tj8guje2jgq6o.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# ── Notifications: Twilio SMS ─────────────────────────────────────────────
app.notifications.sms.enabled=${SMS_ENABLED:false}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# ── Notifications: SendGrid email ─────────────────────────────────────────
app.notifications.email.enabled=${EMAIL_ENABLED:false}
sendgrid.api-key=${SENDGRID_API_KEY:}
app.notifications.email.from=${EMAIL_FROM:no-reply@gridshare.ee}
