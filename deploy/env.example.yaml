# Copy to deploy/env.yaml and fill in real values (env.yaml is gitignored).
# Used by: gcloud run deploy --env-vars-file deploy/env.yaml
SPRING_PROFILES_ACTIVE: prod

# Cloud SQL via socket factory (connection name = PROJECT:REGION:INSTANCE)
DATABASE_URL: "jdbc:postgresql:///gridshare?cloudSqlInstance=ev-gridshare:europe-north1:gridshare-db&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
DATABASE_USER: gridshare
DATABASE_PASSWORD: "CHANGE_ME"

JWT_SECRET: "CHANGE_ME_min_32_bytes_random_string_here_xxxxx"

GOOGLE_CLIENT_ID: "YOUR_CLIENT_ID.apps.googleusercontent.com"
