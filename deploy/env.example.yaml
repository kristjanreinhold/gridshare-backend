FRONTEND_URL: "https://gridshare.ee"
CORS_ALLOWED_ORIGINS: "https://gridshare.ee,https://www.gridshare.ee"

SMS_ENABLED: "true"
TWILIO_ACCOUNT_SID: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
